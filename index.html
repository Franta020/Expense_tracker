<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container-main">
      <h1 class="header">Domácí účetnictví</h1>
      <div class="balance-container">
        <h3>Zůstatek</h3>
        <h2 id="cash">100 Kč</h2>
        <div class="balance-container-a">
          <div class="income-container">
            <p>Příjmy</p>
            <p class="cash-text" id="income">200 Kč</p>
          </div>
          <div class="expense-container">
            <p>Výdaje</p>
            <p class="cash-text" id="expense">100 Kč</p>
          </div>
        </div>
      </div>
      <div class="container-a">
        <div class="track-container trans-item">
          <h3>Platby</h3>
          <div class="track-container-a">
            <div class="transaction-item">
              <div class="trans-name">Oběd</div>
              <div class="trans-value">350 Kč</div>
              <div class="trans-kategory">Jídlo</div>
              <div class="trans-color"></div>
            </div>
          </div>
        </div>
        <div class="add-container trans-item">
          <h3>Přidat Platbu</h3>
          <div class="selection-container">
            <button class="item" id="positive-btn">Přijem</button>
            <button class="item" id="negative-btn">Výdaj</button>
          </div>
          <div class="transaction-management">
            <div class="transactin-positive active">
              <div class="input-label">
                <label for="description">Název platby:</label>
                <input
                  type="text"
                  name="description"
                  placeholder="Vlož název platby..."
                  id="p-description"
                />
              </div>
              <div class="input-label">
                <label for="amount">Hodnota:</label>
                <input
                  type="text"
                  name="amount"
                  id="p-amount"
                  placeholder="Vlož hodnotu.."
                />
              </div>
            </div>
            <div class="transaction-negative">
              <div class="input-label">
                <label for="description">Název platby: </label>
                <input
                  type="text"
                  name="description"
                  placeholder="Vlož název platby..."
                  id="n-description"
                />
              </div>
              <div class="input-label">
                <label for="amount">Hodnota:</label>
                <input
                  type="text"
                  name="amount"
                  id="n-amount"
                  placeholder="Vlož hodnotu.."
                />
              </div>
              <div class="input-label">
                <label for="category">Kategorie:</label>
                <div class="category-selector"></div>
              </div>
            </div>
            <button id="transaction-btn">Přidej platbu</button>
          </div>
        </div>
      </div>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
