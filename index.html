<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container-main">
      <h1 class="header">Domácí účetnictví</h1>
      <div class="balance-container">
        <h3>Zůstatek</h3>
        <h2 id="cash">100 Kč</h2>
        <div class="balance-container-a">
          <div class="income-container">
            <p>Příjmy</p>
            <p class="cash-text" id="income">200 Kč</p>
          </div>
          <div class="expense-container">
            <p>Výdaje</p>
            <p class="cash-text" id="expense">100 Kč</p>
          </div>
        </div>
      </div>
      <div class="container-a">
        <div class="track-container">
          <h3>Platby</h3>
          <div class="track-container-a">
            <div class="saved-transaction"></div>
          </div>
        </div>
        <div class="add-container">
          <h3>Přidat Platbu</h3>
          <div class="selection-container">
            <button class="item" id="positive-btn">Přijem</button>
            <button class="item" id="negative-btn">Výdaj</button>
          </div>
          <div class="transactin-positive active">
            <label for="description">Název platby </label>
            <input
              type="text"
              name="description"
              placeholder="Vlož název platby..."
              id="description"
            />
            <label for="amount">Hodnota</label>
            <input
              type="text"
              name="amount"
              id="amount"
              placeholder="Vlož hodnotu.."
            />
          </div>
          <div class="transaction-negative">
            <label for="description">Název platby </label>
            <input
              type="text"
              name="description"
              placeholder="Vlož název platby..."
              id="description"
            />
            <label for="amount">Hodnota</label>
            <input
              type="text"
              name="amount"
              id="amount"
              placeholder="Vlož hodnotu.."
            />
            <label for="category">Kategorie</label>
            <div class="category-selector"></div>
          </div>

          <button id="transaction-btn">Přidej platbu</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
