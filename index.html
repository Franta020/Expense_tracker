<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense tracker</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="container-main">
      <h1 class="header">Domácí účetnictví</h1>
      <div class="balance-container">
        <div class="calendar-container">
          <div class="year-container">
            <h3 class="year"></h3>
          </div>
          <div class="month-container">
            <i class="fa-solid fa-circle-left"></i>
            <h3 class="month"></h3>
            <i class="fa-solid fa-circle-right"></i>
          </div>
        </div>
        <h3>Zůstatek</h3>
        <h2 id="cash">0,00 Kč</h2>
        <div class="balance-container-a">
          <div class="income-container">
            <p>Příjmy</p>
            <p id="income">0,00 Kč</p>
          </div>
          <div class="expense-container">
            <p>Výdaje</p>
            <p id="expense">0,00 Kč</p>
          </div>
        </div>
      </div>
      <div class="container-payments">
        <div class="container-a trans-item">
          <div class="track-container trans-item">
            <h3>Platby</h3>
            <div class="track-container-a"></div>
          </div>
        </div>
        <div class="add-container trans-item">
          <h3>Přidat Platbu</h3>
          <div class="transaction-management">
            <div class="transaction active">
              <div class="input-label">
                <p>Datum:</p>
                <input type="date" name="n-date" class="date" />
              </div>
              <div class="input-label">
                <p>Název platby:</p>
                <input
                  type="text"
                  name="description"
                  placeholder="Vlož název platby..."
                  class="description"
                />
              </div>
              <div class="input-label">
                <p>Hodnota:</p>
                <input
                  type="number"
                  name="amount"
                  class="amount"
                  placeholder="Vlož hodnotu.."
                />
                <div class="note">pro zapsání výdaje zapiš hodnotu s "-"</div>
              </div>

              <div class="input-label">
                <label for="category">Kategorie:</label>
                <div class="cat-cont">
                  <div class="category-container"></div>
                  <i class="fa-solid fa-plus" id="plus-btn"></i>
                </div>
              </div>
              <button class="btn" id="transaction-btn">Přidej platbu</button>
            </div>
            <div class="category-creation">
              <div class="input-label">
                <p>Název:</p>
                <input
                  type="text"
                  class="cat-name"
                  placeholder="Napiš název kategorie ..."
                />
              </div>
              <div class="input-label">
                <p>Icona:</p>
                <div class="category-container cat-icon">
                  <i class="fa-solid fa-burger"></i>
                  <i class="fa-solid fa-champagne-glasses"></i>
                  <i class="fa-solid fa-coins"></i>
                  <i class="fa-solid fa-house"></i>
                  <i class="fa-solid fa-basket-shopping"></i>
                  <i class="fa-solid fa-lightbulb"></i>
                  <i class="fa-solid fa-tv"></i>
                  <i class="fa-solid fa-plane"></i>
                  <i class="fa-solid fa-heart-pulse"></i>
                  <i class="fa-solid fa-gamepad"></i>
                </div>
              </div>
              <div class="input-label">
                <p>Barva:</p>
                <input type="color" class="cat-color" />
              </div>
              <button class="btn" id="cat-btn">Vytvoř kategorii</button>
              <button class="btn" id="back-btn">Zpět</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
