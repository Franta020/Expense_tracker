<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense tracker</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="container-main">
      <h1 class="header">Domácí účetnictví</h1>
      <div class="balance-container">
        <div class="calendar-container">
          <div class="year-container">
            <h3 class="year"></h3>
          </div>
          <div class="month-container">
            <i class="fa-solid fa-circle-left"></i>
            <h3 class="month"></h3>
            <i class="fa-solid fa-circle-right"></i>
          </div>
        </div>
        <h3>Zůstatek</h3>
        <h2><span id="cash">0.00</span> Kč</h2>
        <div class="balance-container-a">
          <div class="income-container">
            <p>Příjmy</p>
            <p class="cash-text"><span id="income">0.00</span> Kč</p>
          </div>
          <div class="expense-container">
            <p>Výdaje</p>
            <p class="cash-text"><span id="expense">0.00</span> Kč</p>
          </div>
        </div>
      </div>
      <div class="container-a">
        <div class="track-container trans-item">
          <h3>Platby</h3>
          <div class="track-container-a">
            
            </div>
          </div>
        </div>
        <div class="add-container trans-item">
          <h3>Přidat Platbu</h3>
          <div class="transaction-management">
            <div class="transaction-negative">
              <div class="input-label">
                <p>Název platby:</p>
                <input
                  type="text"
                  name="description"
                  placeholder="Vlož název platby..."
                  class="description"
                />
              </div>
              <div class="input-label">
                <p>Hodnota:</p>
                <input
                  type="number"
                  name="amount"
                  class="amount"
                  placeholder="Vlož hodnotu.."
                />
                <div class="note">pro zapsání výdaje zapiš hodnotu s "-"</div>
              </div>
              <div class="input-label">
                <p>Datum:</p>
                <input type="date" name="n-date" class="date" />
              </div>
              <div class="input-label">
                <label for="category">Kategorie:</label>

                <div id="category"></div>
                <!-- TODO - ADD CATEGORIES -->
              </div>
            </div>
            <button id="transaction-btn">Přidej platbu</button>
          </div>
        </div>
      </div>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
