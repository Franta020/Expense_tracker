<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container-main">
      <h1>Domácí účetnictví</h1>
      <div class="balance-container">
        <h3>Zůstatek</h3>
        <h2 id="cash">100 Kč</h2>
        <div class="balance">
          <div class="income-container">
            <p>Příjmy</p>
            <div id="Income">200 Kč</div>
          </div>
          <div class="expense-container">
            <p>Výdaje</p>
            <div id="Expenses">100 Kč</div>
          </div>
        </div>
      </div>
      <div class="transaction-container">
        <div class="track-container">
          <h3>Platby</h3>
          <div class="track-container-a"></div>
        </div>
        <div class="add-container">
          <h3>Přidat Platbu</h3>
          <div>
            <button class="positive-btn">Přijem</button>
            <button class="negative-btn">Výdaj</button>
          </div>
          <div class="transactin-positive active">
            <label for="description">Název platby </label>
            <input
              type="text"
              name="description"
              placeholder="Vlož název platby..."
              id="description"
            />
            <label for="amount">Hodnota</label>
            <input
              type="text"
              name="amount"
              id="amount"
              placeholder="Vlož hodnotu.."
            />
          </div>
          <div class="transaction-negative">
            <label for="description">Název platby </label>
            <input
              type="text"
              name="description"
              placeholder="Vlož název platby..."
              id="description"
            />
            <label for="amount">Hodnota</label>
            <input
              type="text"
              name="amount"
              id="amount"
              placeholder="Vlož hodnotu.."
            />
            <label for="category">Kategorie</label>
            <div class="category-selector"></div>
          </div>

          <button id="transaction-btn">Přidej platbu</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
